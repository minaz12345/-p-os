## 5. GOVERNANCE RECONCILIATION `[IMMUTABLE]`

### **Source of Constitutional Truth**

This document is now the **canonical source of truth** for:
- Which databases are production vs. archived
- What constitutes a violation vs. preserved evidence
- How to interpret runtime state inspections

### **Reconciliation Protocol**

When runtime state differs from governance expectations:
1. Check this declaration for database classification
2. Verify if database is production or archived
3. Assess if active mutations are occurring
4. Determine if difference is violation or intentional archival
5. Update this declaration if reclassification needed

### **Amendment Process**

To change database classification:
1. Propose reclassification with justification
2. Constitutional Council review required
3. Update this document with new classification
4. Document rationale in change history
5. Notify all operators of classification change


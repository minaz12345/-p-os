## 3. ROLLBACK POLICY CLARIFICATION `[IMMUTABLE]`

### **Original Intent (2026-05-12)**

The rollback was intended to:
1. Remove semantic canonicalization tables from **production runtime**
2. Preserve migration evidence for v8.0 evaluation
3. Restore constitutional compliance

### **What Actually Happened**

1. ✅ Tables dropped from pos_operational (if they existed there)
2. ❌ milejczyce_operational database NOT dropped
3. ✅ Migration evidence preserved (unintentionally)
4. ⚠️ Classification ambiguity created (was this intentional archival or incomplete rollback?)

### **Retrospective Decision**

**Decision:** milejczyce_operational is hereby **formally classified** as:
- **Archived Forensic Runtime**
- **Epistemic Layer Candidate**
- **Non-Production Sovereign Branch**

**Rationale:**
- Destroying evidence would be wasteful
- Preservation enables v8.0 evaluation
- Clear classification prevents future confusion
- No production risk (database is isolated)


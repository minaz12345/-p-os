### **Epistemic State Classification**

Beyond lifecycle status, each runtime has an **epistemic state** that determines how it should be interpreted:

| Epistemic State | Definition | When Used | Action Required |
|----------------|------------|-----------|----------------|
| **TRUSTED** | Governance has validated and classified this runtime | Production databases with clear ownership | Normal operations |
| **DISPUTED** | Conflicting interpretations exist, reconciliation needed | Ambiguous cases requiring council review | Initiate reconciliation workflow |
| **TRANSITIONAL** | Recently changed, classification pending finalization | Post-migration, pre-classification | Complete classification within 48h |
| **SUPERSEDED** | Replaced by newer version, preserved for historical reference | Old production snapshots | Read-only access, no mutations |
| **QUARANTINED** | Suspected anomaly, under investigation | Unusual patterns detected | Isolate, investigate, preserve evidence |

**Current Epistemic States:**

| Database | Epistemic State | Rationale |
|----------|----------------|-----------|
| `pos_operational` | TRUSTED | Clear production ownership, validated schema |
| `milejczyce_operational` | TRUSTED | Classified as archived candidate, rationale documented |
| `pos_operational_restore_test` | TRUSTED | Test database, isolated from production |

**Epistemic State Transitions:**
```
TRANSITIONAL → (classification complete) → TRUSTED
TRUSTED → (anomaly detected) → QUARANTINED
QUARANTINED → (investigation complete) → TRUSTED | SUPERSEDED | DISPUTED
DISPUTED → (council decision) → TRUSTED | SUPERSEDED
```


  "strict": true
}
```

### Ustawienia Ochrony:
- ✅ **Admin Enforcement:** Even repository admins must follow rules
- ✅ **Required Approvals:** Minimum 1 human approval
- ✅ **Dismiss Stale Reviews:** Old approvals invalidated on new commits
- ❌ **Force Pushes:** Blocked - prevents history rewriting
- ❌ **Deletions:** Blocked - prevents accidental branch deletion
- ✅ **Linear History:** Enforced - keeps git history clean


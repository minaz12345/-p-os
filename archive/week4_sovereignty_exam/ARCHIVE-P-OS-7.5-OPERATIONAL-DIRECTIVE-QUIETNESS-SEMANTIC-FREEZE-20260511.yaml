## 3. KANDYDATURA ARCHITEKTONICZNA v8.0 `[IMMUTABLE]`

### Hybrid Enforcement Model

**Problem zidentyfikowany:** Full repository purity model tworzy ryzyko constitutional deadlock.

**Rozwiązanie proponowane:**

```text
FULL SCAN + SCOPED ENFORCEMENT

Agent skanuje całe repo (awareness)
ALE blokuje tylko:
- Nowe naruszenia w zmienionych plikach
- Degradację health score
- Mutacje sekcji immutable
- Schema drift bez migracji

Raportuje ale NIE blokuje:
- Historyczne znane naruszenia
- Udokumentowane wyjątki
- Legacy artifacts oznaczone do cleanup
```

### Dokumentacja Referencyjna

- `docs/DESIGN_NOTE_P-OS_v8.0_ENFORCEMENT_SEMANTICS.md` - Pełna specyfikacja techniczna
- `.github/workflows/constitutional-review.yml` - Obecna implementacja agenta
- PR #8 incident report - Trigger dla tej analizy

### Decyzja Wymagana

**Pytanie dla planowania v8.0:** Czy P-OS powinien przyjąć hybrydowy model egzekucji?

**Opcje:**
1. **Przyjąć model hybrydowy** (Rekomendowane) - Zrównoważone podejście
2. **Utrzymać pełną czystość** - Obecne zachowanie v7.5
3. **Przejść na delta-only** - Skanowanie tylko zmienionych plików

**Rekomendacja:** Opcja 1 - Model hybrydowy zapewnia najlepsze zrównoważenie suwerenności i wykonalności operacyjnej.

